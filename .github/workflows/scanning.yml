#
# Scan repository and containers for security vulnerabilities, secrets and
# misconfigurations.

name: Vulnerability and Misconfiguration Scan

on:
  schedule:
  # run every night at 4:31 AM (UTC)
  - cron: '31 4 * * *'
  # enable running the workflow manually
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      DOCKER_HUB_NAMESPACE: "eclipsehono"

    strategy:
      matrix:
        artifactId:
          - hono-adapter-amqp
          - hono-adapter-coap
          - hono-adapter-http
          - hono-adapter-lora
          - hono-adapter-mqtt
          - hono-adapter-sigfox
          - hono-service-auth
          - hono-service-command-router-infinispan
          - hono-service-device-registry-jdbc
          - hono-service-device-registry-mongodb

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Maven
        uses: stCarolas/setup-maven@12eb41b233df95d49b0c11fc1b5bc8312e5d4ce0 # v5.1
        with:
          maven-version: 3.9.11

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Create Container Image
        run: |
          mvn -B -e -DskipTests \
            -Pbuild-docker-image,metrics-prometheus \
            --projects ":${{ matrix.artifactId }}" \
            --also-make \
            clean install
          docker image ls --format "{{.Repository}}:{{.Tag}}" "${DOCKER_HUB_NAMESPACE}/${{ matrix.artifactId }}"

      - name: Install Trivy
        # use SHA pinned version (0.2.6) of the action as recommended in
        # https://github.com/aquasecurity/trivy/discussions/10425
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514

      - name: Scan Docker image
        run: |
          mkdir -p results
          imageName=$(docker image ls --format "{{.Repository}}:{{.Tag}}" "${DOCKER_HUB_NAMESPACE}/${{ matrix.artifactId }}")
          echo "Scanning image $imageName ..."
          trivy image "$imageName" --timeout 15m0s --ignore-unfixed --severity HIGH,CRITICAL --format sarif --output "results/${{ matrix.artifactId }}.sarif"

      - name: Upload Docker image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: "results/${{ matrix.artifactId }}.sarif"
          category: "Container Image ${{ matrix.artifactId }}"
